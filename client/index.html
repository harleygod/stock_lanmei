<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>股票决策辅助系统</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <style>
      #loading { position:fixed; inset:0; z-index:9999; background:#f5f5f5; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:sans-serif; }
      .loader { width:40px;height:40px;border:4px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px; }
      @keyframes spin { to { transform:rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading"><div class="loader"></div><p style="color:#666">加载中...</p></div>
    <div id="root"></div>
    <script>
      new MutationObserver(function(mutations) {
        for (var m of mutations) {
          if (m.addedNodes.length) {
            var loading = document.getElementById('loading');
            if (loading) { loading.style.display = 'none'; }
            this.disconnect();
            return;
          }
        }
      }).observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
