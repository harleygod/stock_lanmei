<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>连接测试</title>
<style>
body { font-family: sans-serif; padding: 20px; text-align: center; margin-top: 60px; background: #f5f5f5; }
.card { background: white; border-radius: 12px; padding: 30px; max-width: 400px; margin: 0 auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.green { color: #16a34a; font-size: 48px; }
h1 { margin: 10px 0; }
p { color: #666; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <div class="green">✅</div>
  <h1>连接正常</h1>
  <p>如果你看到这个页面，说明网络和服务器都没问题。</p>
  <hr style="margin:20px 0;border:none;border-top:1px solid #eee">
  <p style="font-size:14px;color:#999">
    主页需要 JavaScript 才能运行。<br>
    请确保浏览器没有禁用 JavaScript，<br>
    并尝试清除缓存后刷新。
  </p>
</div>
</body>
</html>
